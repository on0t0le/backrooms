<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE BACKROOMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;width:100%;cursor:default;font-family:'Courier New',monospace;}
  #screen{display:block;position:absolute;top:0;left:0;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges;background:#000;}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
  #vignette{position:absolute;top:0;left:0;width:100%;height:100%;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 35%, rgba(10,8,4,0.55) 85%, rgba(5,4,2,0.9) 100%);
    pointer-events:none;}
  #grain{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.07;mix-blend-mode:overlay;pointer-events:none;}
  #scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 3px);
    mix-blend-mode:multiply;}
  #chroma{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
    box-shadow: inset 0 0 0 100vmax rgba(0,0,0,0); }
  #flash{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;pointer-events:none;z-index:50;}
  #subtitle{position:absolute;bottom:8%;left:0;width:100%;text-align:center;color:#d8d2c0;
    font-size:1.1em;letter-spacing:1px;text-shadow:0 0 6px #000,0 0 2px #000;opacity:0;
    transition:opacity 0.8s ease;pointer-events:none;z-index:10;}
  #crosshair{position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px;border-radius:50%;
    background:rgba(255,255,255,0.25);pointer-events:none;z-index:10;}
  #hud{position:absolute;top:10px;left:10px;color:#998;font-size:11px;opacity:0.4;z-index:10;pointer-events:none;}
  #start{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;color:#c9c2a0;
    display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100;cursor:pointer;}
  #start h1{font-size:2.4em;letter-spacing:6px;font-weight:400;text-shadow:0 0 20px #665;margin-bottom:0.2em;}
  #start p{opacity:0.6;font-size:0.9em;}
  #paused{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);color:#c9c2a0;
    display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:90;}
  #paused h2{font-size:1.6em;letter-spacing:4px;font-weight:400;margin-bottom:0.2em;}
  #paused .stats{opacity:0.8;font-size:0.85em;margin-bottom:1.4em;text-align:center;line-height:1.6;}
  #paused .hint{opacity:0.45;font-size:0.72em;margin-top:1.4em;max-width:30em;text-align:center;}
  #end{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);
    display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:95;}
  #end h2{font-size:2em;letter-spacing:5px;font-weight:400;margin-bottom:0.2em;}
  #end .stats{opacity:0.8;font-size:0.9em;margin-bottom:1.6em;text-align:center;line-height:1.6;}
  #end.win{color:#d8e6b0;} #end.win h2{text-shadow:0 0 24px #6a8;}
  #end.lose{color:#e0b0a0;} #end.lose h2{text-shadow:0 0 24px #844;}
  .btn{font-family:inherit;font-size:0.95em;letter-spacing:2px;color:#0a0a08;background:#c9c2a0;
    border:none;padding:0.7em 2em;margin:0.4em;cursor:pointer;border-radius:2px;text-transform:uppercase;}
  .btn:hover{background:#e6dfbe;}
  .btn.ghost{background:transparent;color:#c9c2a0;border:1px solid rgba(201,194,160,0.5);}
  .btn.ghost:hover{background:rgba(201,194,160,0.12);}
  #huntwarn{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;opacity:0;
    box-shadow:inset 0 0 28vmax 8vmax rgba(120,0,0,0.55);transition:opacity 0.25s ease;}
  #huntwarn.on{opacity:1;}
  #hunttext{position:absolute;top:14%;left:0;width:100%;text-align:center;color:#e8c0b0;
    font-size:1.15em;letter-spacing:3px;text-shadow:0 0 8px #000;opacity:0;transition:opacity 0.3s ease;
    pointer-events:none;z-index:11;}
  #hunttext.on{opacity:1;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<canvas id="screen"></canvas>
<div id="overlay">
  <div id="vignette"></div>
  <div id="scanlines"></div>
  <canvas id="grain"></canvas>
  <div id="huntwarn"></div>
  <div id="hunttext"></div>
  <div id="crosshair"></div>
  <div id="subtitle"></div>
  <div id="hud"></div>
</div>
<div id="flash"></div>
<div id="start">
  <h1>THE BACKROOMS</h1>
  <p>click to enter &mdash; WASD/arrows move &middot; mouse look &middot; F flashlight &middot; Esc menu</p>
  <p style="margin-top:1.2em;opacity:0.45;max-width:34em;text-align:center;line-height:1.6">find the marked exit to escape &middot; if something starts hunting you, keep changing direction to lose it</p>
</div>
<div id="paused" class="hidden">
  <h2>PAUSED</h2>
  <div class="stats" id="pausedStats"></div>
  <button class="btn" id="resumeBtn">Resume</button>
  <button class="btn ghost" id="restartBtn">Restart Run</button>
  <div class="hint">mouse is free &mdash; press Esc again anytime to release it</div>
</div>
<div id="end" class="hidden">
  <h2 id="endTitle"></h2>
  <div class="stats" id="endStats"></div>
  <button class="btn" id="againBtn">Play Again</button>
</div>
<script>
(function(){
"use strict";

/* ============================================================
   UTIL / PRNG / NOISE
   ============================================================ */
let SEED = (function(){
  const s = localStorage.getItem('backrooms_seed');
  if (s) return parseInt(s,10);
  const v = (Math.random()*2147483647)|0;
  localStorage.setItem('backrooms_seed', v);
  return v;
})();

function hash2(x, y, salt){
  let h = (x*374761393 + y*668265263 + (salt||0)*2654435761 + SEED*40503) | 0;
  h = (h ^ (h >>> 13)) * 1274126177 | 0;
  h = (h ^ (h >>> 16));
  return ((h >>> 0) % 100000) / 100000;
}
function lerp(a,b,t){ return a+(b-a)*t; }
function smooth(t){ return t*t*(3-2*t); }

function valueNoise(x, y, salt){
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x-xi, yf = y-yi;
  const v00 = hash2(xi,yi,salt), v10 = hash2(xi+1,yi,salt);
  const v01 = hash2(xi,yi+1,salt), v11 = hash2(xi+1,yi+1,salt);
  const u = smooth(xf), v = smooth(yf);
  return lerp(lerp(v00,v10,u), lerp(v01,v11,u), v);
}
function fbm(x, y, salt, oct){
  oct = oct||4;
  let total=0, amp=0.5, freq=1, max=0;
  for(let i=0;i<oct;i++){
    total += valueNoise(x*freq, y*freq, salt) * amp;
    max += amp;
    amp *= 0.5; freq *= 2.07;
  }
  return total/max;
}

/* ============================================================
   PROCEDURAL TEXTURES  (64x64, packed Uint32 RGBA, little-endian)
   ============================================================ */
const TEX_SIZE = 64;
function packRGBA(r,g,b,a){ return (a<<24)|(b<<16)|(g<<8)|r; }

function makeWallpaperTex(){
  const buf = new Uint32Array(TEX_SIZE*TEX_SIZE);
  for(let y=0;y<TEX_SIZE;y++){
    for(let x=0;x<TEX_SIZE;x++){
      // canonical Backrooms mono-yellow mustard wallpaper
      let n = fbm(x*0.08, y*0.08, 11, 3);
      let base = lerp(188, 208, n);
      let r = base, g = base*0.87, b = base*0.42;
      // vertical seams every 16px (faint)
      if (x % 16 < 1) { r*=0.8; g*=0.8; b*=0.8; }
      // subtle repeating diamond/chevron print, darker yellow ink
      const motifX = x % 16, motifY = y % 16;
      const dx = Math.abs(motifX-8), dy = Math.abs(motifY-8);
      const diamond = dx+dy; // diamond outline distance
      if (diamond>5 && diamond<7.5){
        const inkN = hash2(Math.floor(x/16), Math.floor(y/16), 13);
        const ink = 0.12 + inkN*0.06; // low contrast
        r *= (1-ink*0.45); g *= (1-ink*0.45); b *= (1-ink*0.3);
      }
      // damp stains - subtle darker yellow-brown blotches, worse toward bottom
      const stain = fbm(x*0.05+50, y*0.05+50, 22, 4);
      const vBias = (y/TEX_SIZE);
      if (stain*(0.5+vBias*0.6) > 0.62){
        const sd = (stain-0.62)*1.6;
        r *= (1-0.28*sd); g *= (1-0.3*sd); b *= (1-0.22*sd);
      }
      // very light grime
      const sp = hash2(x,y,77);
      if (sp>0.985){ r*=0.78; g*=0.78; b*=0.7; }
      // baseboard band along the bottom of the texture
      if (y > TEX_SIZE-6){
        const bb = (y-(TEX_SIZE-6))/6;
        r *= (1-0.4*bb); g *= (1-0.4*bb); b *= (1-0.4*bb);
      }
      buf[y*TEX_SIZE+x] = packRGBA(r|0,g|0,b|0,255);
    }
  }
  return buf;
}

function makeCarpetTex(){
  const buf = new Uint32Array(TEX_SIZE*TEX_SIZE);
  for(let y=0;y<TEX_SIZE;y++){
    for(let x=0;x<TEX_SIZE;x++){
      // damp mono-yellow carpet, same hue as walls but darker/moist
      let n = fbm(x*0.12,y*0.12,33,3);
      let base = lerp(140,162,n);
      let r = base, g = base*0.82, b = base*0.44;
      // moist patches - slightly darker, sheen toward yellow-brown
      const wet = fbm(x*0.06+9,y*0.06+9,44,4);
      if (wet>0.56){ const wd=(wet-0.56)*1.6; r*=(1-0.22*wd); g*=(1-0.24*wd); b*=(1-0.18*wd); }
      // subtle fiber speckle
      const sp = hash2(x,y,88);
      r=Math.max(0,Math.min(255,r+(sp-0.5)*10));
      g=Math.max(0,Math.min(255,g+(sp-0.5)*8));
      b=Math.max(0,Math.min(255,b+(sp-0.5)*4));
      buf[y*TEX_SIZE+x] = packRGBA(r|0,g|0,b|0,255);
    }
  }
  return buf;
}

function makeCeilingTex(){
  const buf = new Uint32Array(TEX_SIZE*TEX_SIZE);
  for(let y=0;y<TEX_SIZE;y++){
    for(let x=0;x<TEX_SIZE;x++){
      let base = 200;
      // tile grid lines
      const gx = x % 32, gy = y % 32;
      let r=base, g=base*0.94, b=base*0.72;
      if (gx<1 || gy<1){ r*=0.62; g*=0.62; b*=0.58; }
      const stain = fbm(x*0.07+5,y*0.07+5,55,3);
      if (stain>0.68){ const sd=(stain-0.68)*1.6; r*=(1-0.28*sd); g*=(1-0.3*sd); b*=(1-0.24*sd); }
      const sp = hash2(x,y,99);
      if (sp>0.99){ r*=0.7; g*=0.7; b*=0.65; }
      buf[y*TEX_SIZE+x] = packRGBA(r|0,g|0,b|0,255);
    }
  }
  return buf;
}

const TEX_WALL = makeWallpaperTex();
const TEX_FLOOR = makeCarpetTex();
const TEX_CEIL = makeCeilingTex();

/* ============================================================
   WORLD: infinite chunked grid with guaranteed street network
   ============================================================ */
const CHUNK = 16;
const STREET_SPACING = 8;
const chunkCache = new Map(); // key "cx,cy" -> {data:Uint8Array(256), last:number}
const overrides = new Map(); // "gx,gy" -> {wall:bool, expires:number} for spatial anomalies
let frameClock = 0;

function isStreet(gx,gy){
  return (((gx%STREET_SPACING)+STREET_SPACING)%STREET_SPACING===0) ||
         (((gy%STREET_SPACING)+STREET_SPACING)%STREET_SPACING===0);
}
function rawIsWall(gx,gy){
  if (isStreet(gx,gy)) return false;
  const v = fbm(gx*0.16, gy*0.16, 3, 4);
  return v > 0.5;
}
function isLightCell(gx,gy){
  if (!isStreet(gx,gy)) return false;
  return hash2(gx,gy,5) < 0.14;
}
function buildChunk(cx,cy){
  const data = new Uint8Array(CHUNK*CHUNK);
  for(let ly=0; ly<CHUNK; ly++){
    for(let lx=0; lx<CHUNK; lx++){
      const gx = cx*CHUNK+lx, gy = cy*CHUNK+ly;
      data[ly*CHUNK+lx] = rawIsWall(gx,gy) ? 1 : 0;
    }
  }
  return data;
}
const MAX_CHUNKS = 81;
function getChunk(cx,cy){
  const key = cx+','+cy;
  let c = chunkCache.get(key);
  if (!c){
    c = { data: buildChunk(cx,cy), last: frameClock };
    chunkCache.set(key, c);
    if (chunkCache.size > MAX_CHUNKS){
      let oldestKey=null, oldestT=Infinity;
      for (const [k,v] of chunkCache){ if (v.last<oldestT){ oldestT=v.last; oldestKey=k; } }
      if (oldestKey) chunkCache.delete(oldestKey);
    }
  } else c.last = frameClock;
  return c.data;
}
function cellIsWall(gx,gy){
  const ov = overrides.get(gx+','+gy);
  if (ov){
    if (ov.expires < performance.now()) overrides.delete(gx+','+gy);
    else return ov.wall;
  }
  const cx = Math.floor(gx/CHUNK), cy = Math.floor(gy/CHUNK);
  const lx = (((gx%CHUNK)+CHUNK)%CHUNK), ly = (((gy%CHUNK)+CHUNK)%CHUNK);
  return getChunk(cx,cy)[ly*CHUNK+lx] === 1;
}

/* ============================================================
   LIGHTS - dynamic list near player, with flicker / off state
   ============================================================ */
const lightStates = new Map(); // "gx,gy" -> {flicker:0..1, off:bool, offUntilLook:bool}
let nearbyLights = [];
function lightStateFor(gx,gy){
  const key = gx+','+gy;
  let s = lightStates.get(key);
  if (!s){ s = {flicker:1, off:false, lookToRestore:false}; lightStates.set(key,s); }
  return s;
}
function refreshNearbyLights(px,py){
  const R = 14;
  const cgx = Math.round(px), cgy = Math.round(py);
  const out = [];
  for(let dy=-R; dy<=R; dy++){
    for(let dx=-R; dx<=R; dx++){
      const gx=cgx+dx, gy=cgy+dy;
      if (isLightCell(gx,gy)){
        out.push({x:gx+0.5, y:gy+0.5, gx, gy});
      }
    }
  }
  nearbyLights = out;
}

function lightContribution(wx, wy){
  let total = 0;
  for(let i=0;i<nearbyLights.length;i++){
    const L = nearbyLights[i];
    const st = lightStateFor(L.gx,L.gy);
    if (st.off) continue;
    const dx = wx-L.x, dy = wy-L.y;
    const d2 = dx*dx+dy*dy;
    const falloff = 1.0/(1.0+d2*1.6);
    total += falloff * 0.55 * st.flicker;
  }
  return total;
}

/* ============================================================
   PLAYER / CONTROLS
   ============================================================ */
const player = { x:1.5, y:1.5, angle:0, flashlight:false };
let runStartTime = performance.now();
let caught = false;   // lost: an entity reached you
let escaped = false;  // won: reached the exit
let runOver = false;  // freezes input/physics while an end overlay is up
let paused = false;   // freezes the sim while the pause menu is open
(function loadSave(){
  try{
    const raw = localStorage.getItem('backrooms_save');
    if (raw){
      const s = JSON.parse(raw);
      if (typeof s.x==='number') player.x=s.x;
      if (typeof s.y==='number') player.y=s.y;
      if (typeof s.angle==='number') player.angle=s.angle;
    }
  }catch(e){}
})();
function saveGame(){
  if (runOver) return;
  try{ localStorage.setItem('backrooms_save', JSON.stringify({x:player.x,y:player.y,angle:player.angle})); }catch(e){}
}
setInterval(saveGame, 3000);

/* ---- EXIT cell: one rare, deterministic escape tile per world ---- */
let exitCell = null;
function computeExitCell(){
  // spiral out over street-grid cells from spawn; first cell past a min
  // distance that clears a deterministic rarity threshold becomes the exit.
  const sx = Math.round(player.x), sy = Math.round(player.y);
  const MIN_DIST = 40, MAX_R = 240;
  let best = null;
  for (let r=STREET_SPACING; r<=MAX_R && !best; r+=STREET_SPACING){
    for (let a=-r; a<=r && !best; a+=STREET_SPACING){
      const cands = [ [sx+a, sy-r], [sx+a, sy+r], [sx-r, sy+a], [sx+r, sy+a] ];
      for (const [gx,gy] of cands){
        if (!isStreet(gx,gy)) continue;
        if (cellIsWall(gx,gy)) continue;
        const d = Math.hypot(gx-sx, gy-sy);
        if (d < MIN_DIST) continue;
        if (hash2(gx,gy,777) < 0.02){ best = {gx, gy, x:gx+0.5, y:gy+0.5, d}; break; }
      }
    }
  }
  // guaranteed fallback so an exit always exists
  exitCell = best || {gx:sx+MIN_DIST, gy:sy, x:sx+MIN_DIST+0.5, y:sy+0.5, d:MIN_DIST};
}

/* ---- TRAIL: a route to the exit, but only the next few cells ever glow ---- */
// Built along the guaranteed-open street lattice; stored as cell-key -> order
// index from the player. The renderer only lights the lowest indices (the next
// stretch ahead), so it guides without laying out the whole solution.
const TRAIL_WINDOW = 14;          // how many cells ahead light up
let trailSet = new Map();
let trailKeyCell = '';
function pushLine(x0,y0,x1,y1,arr){
  // axis-aligned Manhattan walk (x first, then y), inclusive of both ends
  let x=x0, y=y0;
  arr.push([x,y]);
  while (x!==x1){ x += x1>x?1:-1; arr.push([x,y]); }
  while (y!==y1){ y += y1>y?1:-1; arr.push([x,y]); }
}
function computeTrail(){
  trailSet = new Map();
  if (!exitCell) return;
  const S = STREET_SPACING;
  const px=Math.round(player.x), py=Math.round(player.y);
  const ex=exitCell.gx, ey=exitCell.gy;
  // nearest street intersections to player and to exit (multiples of S are streets)
  const ix=Math.round(px/S)*S, iy=Math.round(py/S)*S;
  const jx=Math.round(ex/S)*S, jy=Math.round(ey/S)*S;
  const arr=[];
  pushLine(px,py, ix,iy, arr);   // hop onto the nearest street intersection
  pushLine(ix,iy, ix,jy, arr);   // travel the vertical street
  pushLine(ix,jy, jx,jy, arr);   // travel the horizontal street
  pushLine(jx,jy, ex,ey, arr);   // step into the exit
  let idx=0;
  for (const [x,y] of arr){ const k=x+','+y; if (!trailSet.has(k)) trailSet.set(k, idx); idx++; }
}

const keys = {};
window.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if (e.code==='KeyF') toggleFlashlight();
});
window.addEventListener('keyup', e=>{ keys[e.code]=false; });

let pointerLocked=false;
let gameStarted=false;
const screenCanvas = document.getElementById('screen');
const startScreen = document.getElementById('start');
const pausedScreen = document.getElementById('paused');
const endScreen = document.getElementById('end');

function fmtTime(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const m = Math.floor(s/60);
  return m+':'+String(s%60).padStart(2,'0');
}
function refreshPausedStats(){
  document.getElementById('pausedStats').innerHTML =
    'time survived: '+fmtTime(performance.now()-runStartTime)+'<br>'+
    'distance walked: '+Math.floor(distanceWalked)+' m';
}

function toggleFlashlight(){
  player.flashlight = !player.flashlight;
  audioFlashlightClick();
}

document.addEventListener('mousemove', e=>{
  if (!pointerLocked) return;
  player.angle += e.movementX * 0.0022;
  lastTurnDelta = e.movementX*0.0022;
});
document.addEventListener('pointerlockchange', ()=>{
  pointerLocked = document.pointerLockElement === screenCanvas;
  // Esc (or any external unlock) frees the mouse and opens the menu - never
  // re-lock automatically, so the cursor can always reach browser chrome.
  if (gameStarted && !runOver){
    if (pointerLocked){ pausedScreen.classList.add('hidden'); paused=false; }
    else { paused=true; refreshPausedStats(); pausedScreen.classList.remove('hidden'); }
  }
});
startScreen.addEventListener('click', ()=>{
  startScreen.classList.add('hidden');
  gameStarted = true;
  runStartTime = performance.now();
  computeExitCell();
  computeTrail();
  screenCanvas.requestPointerLock();
  initAudio();
});
document.getElementById('resumeBtn').addEventListener('click', ()=>{
  pausedScreen.classList.add('hidden');
  paused = false;
  screenCanvas.requestPointerLock();
});
document.getElementById('restartBtn').addEventListener('click', restartRun);
document.getElementById('againBtn').addEventListener('click', restartRun);

function restartRun(){
  // brand-new world: fresh seed, fresh layout, fresh exit
  SEED = (Math.random()*2147483647)|0;
  try{ localStorage.setItem('backrooms_seed', SEED); }catch(e){}
  try{ localStorage.removeItem('backrooms_save'); }catch(e){}
  chunkCache.clear();
  overrides.clear();
  lightStates.clear();
  player.x = 1.5; player.y = 1.5; player.angle = 0; player.flashlight = false;
  distanceWalked = 0;
  caught = false; escaped = false; runOver = false; paused = false;
  runStartTime = performance.now();
  // reset event/hunt scheduler
  eventActive = false; eventCooldownUntil = 0; nextEventAt = performance.now()+4000;
  firstSilhouetteDone = false; screamUsed = false;
  endHunt(); straightWalkTimer = 0; huntCooldownUntil = 0;
  stalker = null; stalkerCooldownUntil = 0; ambientScale = 1;
  activeSprites.length = 0;
  refreshNearbyLights(player.x, player.y);
  computeExitCell();
  trailKeyCell = ''; computeTrail();
  endScreen.classList.add('hidden');
  pausedScreen.classList.add('hidden');
  screenCanvas.requestPointerLock();
}

function finishRun(win){
  if (runOver) return;
  runOver = true;
  escaped = win; caught = !win;
  endHunt();
  if (document.pointerLockElement) document.exitPointerLock();
  pausedScreen.classList.add('hidden');
  endScreen.classList.remove('hidden');
  endScreen.classList.toggle('win', win);
  endScreen.classList.toggle('lose', !win);
  document.getElementById('endTitle').textContent = win ? 'YOU FOUND A WAY OUT' : 'YOU DIDN’T MAKE IT';
  document.getElementById('endStats').innerHTML =
    'time survived: '+fmtTime(performance.now()-runStartTime)+'<br>'+
    'distance walked: '+Math.floor(distanceWalked)+' m';
}

let lastTurnDelta = 0;
let totalTurnSinceEvent = 0;

function moveAmount(dx,dy,dist){
  // try sliding collision against grid walls with small radius
  const R = 0.22;
  let nx = player.x + dx, ny = player.y;
  if (!cellIsWall(Math.floor(nx+R*Math.sign(dx||1)), Math.floor(player.y)) &&
      !cellIsWall(Math.floor(nx-R), Math.floor(ny-R)) && !cellIsWall(Math.floor(nx+R), Math.floor(ny+R)) &&
      !cellIsWall(Math.floor(nx-R), Math.floor(ny+R)) && !cellIsWall(Math.floor(nx+R), Math.floor(ny-R))) {
    player.x = nx;
  }
  nx = player.x; ny = player.y + dy;
  if (!cellIsWall(Math.floor(nx-R), Math.floor(ny-R)) && !cellIsWall(Math.floor(nx+R), Math.floor(ny+R)) &&
      !cellIsWall(Math.floor(nx-R), Math.floor(ny+R)) && !cellIsWall(Math.floor(nx+R), Math.floor(ny-R))) {
    player.y = ny;
  }
}

let distanceWalked = 0;
let isWalking = false;
let straightWalkTimer = 0;   // seconds of near-straight walking (feeds the hunt)
function updatePlayer(dt){
  if (runOver){ isWalking=false; lastTurnDelta=0; return; }
  const speed = 2.6 * dt;
  let mx=0,my=0;
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const perpX=-dirY, perpY=dirX;
  // arrows mirror WASD: up/down = forward/back, left/right = strafe
  if (keys['KeyW']||keys['ArrowUp']){ mx+=dirX; my+=dirY; }
  if (keys['KeyS']||keys['ArrowDown']){ mx-=dirX; my-=dirY; }
  if (keys['KeyA']||keys['ArrowLeft']){ mx-=perpX; my-=perpY; }
  if (keys['KeyD']||keys['ArrowRight']){ mx+=perpX; my+=perpY; }
  const len = Math.hypot(mx,my);
  isWalking = len>0.01;
  if (isWalking){
    mx/=len; my/=len;
    moveAmount(mx*speed, my*speed, speed);
    distanceWalked += speed;
  }
  const turnedThisFrame = Math.abs(lastTurnDelta);
  totalTurnSinceEvent += turnedThisFrame;
  if (huntActive) huntTurnAccum += turnedThisFrame;
  // straight-walk timer: grows while walking ~straight, resets on a real turn
  if (turnedThisFrame > 0.05) straightWalkTimer = Math.max(0, straightWalkTimer - turnedThisFrame*6);
  if (isWalking) straightWalkTimer += dt; else straightWalkTimer = Math.max(0, straightWalkTimer - dt*0.5);
  lastTurnDelta = 0;
}

/* ============================================================
   RENDERER: DDA raycaster, internal buffer upscaled
   ============================================================ */
const BW = 480, BH = 270;
const renderCanvas = document.createElement('canvas');
renderCanvas.width = BW; renderCanvas.height = BH;
const rctx = renderCanvas.getContext('2d');
const imgData = rctx.createImageData(BW, BH);
const pix32 = new Uint32Array(imgData.data.buffer);

const sctx = screenCanvas.getContext('2d');
sctx.imageSmoothingEnabled = false;
function resize(){
  screenCanvas.width = window.innerWidth;
  screenCanvas.height = window.innerHeight;
  sctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

const FOV = 66 * Math.PI/180;
const HALF_FOV = FOV/2;
const zbuffer = new Float64Array(BW);
const horizon = BH*0.5;

// warm yellow haze (canonical Backrooms), mid-luminance so it never goes white or black
const FOG_R=150, FOG_G=126, FOG_B=64;
const AMBIENT = 0.62; // never-too-dark base brightness, soft even light
let ambientScale = 1; // dropped briefly during a blackout beat, then restored
const MAX_DIST = 16;

function shadeColor(r,g,b,brightness,dist){
  brightness = Math.min(1.25, AMBIENT*ambientScale+brightness);
  let rr = r*brightness, gg=g*brightness, bb=b*brightness;
  const fogT = Math.min(1, dist/MAX_DIST);
  rr = lerp(rr, FOG_R, fogT*0.85);
  gg = lerp(gg, FOG_G, fogT*0.85);
  bb = lerp(bb, FOG_B, fogT*0.85);
  return [rr>255?255:rr, gg>255?255:gg, bb>255?255:bb];
}

function flashlightContribution(rayDirX, rayDirY, dist){
  if (!player.flashlight) return 0;
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const dot = rayDirX*dirX + rayDirY*dirY; // cos of angle between ray and forward
  if (dot < 0.85) return 0;
  const cone = (dot-0.85)/0.15;
  const falloff = 1.0/(1.0+dist*dist*0.12);
  return cone*falloff*2.4;
}

function castColumn(x){
  const camX = (x/BW)*2 - 1;
  const rayAngle = player.angle + Math.atan(camX*Math.tan(HALF_FOV));
  const rdx = Math.cos(rayAngle), rdy = Math.sin(rayAngle);

  let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
  const deltaDistX = Math.abs(1/rdx), deltaDistY = Math.abs(1/rdy);
  let stepX, stepY, sideDistX, sideDistY;
  if (rdx<0){ stepX=-1; sideDistX=(player.x-mapX)*deltaDistX; } else { stepX=1; sideDistX=(mapX+1-player.x)*deltaDistX; }
  if (rdy<0){ stepY=-1; sideDistY=(player.y-mapY)*deltaDistY; } else { stepY=1; sideDistY=(mapY+1-player.y)*deltaDistY; }

  let side=0, hit=false, dist=0;
  for(let i=0;i<64 && !hit;i++){
    if (sideDistX<sideDistY){ sideDistX+=deltaDistX; mapX+=stepX; side=0; }
    else { sideDistY+=deltaDistY; mapY+=stepY; side=1; }
    if (cellIsWall(mapX,mapY)) hit=true;
  }
  if (!hit){ dist=MAX_DIST; }
  else dist = side===0 ? (sideDistX-deltaDistX) : (sideDistY-deltaDistY);
  dist *= Math.cos(rayAngle-player.angle); // correct fisheye

  let wallX;
  if (side===0) wallX = player.y + dist*rdy; else wallX = player.x + dist*rdx;
  wallX -= Math.floor(wallX);
  let texX = Math.floor(wallX*TEX_SIZE);
  if ((side===0 && rdx>0) || (side===1 && rdy<0)) texX = TEX_SIZE-texX-1;

  zbuffer[x] = hit ? dist : MAX_DIST;

  const lineHeight = Math.min(BH*3, (BH/Math.max(dist,0.0001)));
  let drawStart = Math.floor(horizon - lineHeight/2);
  let drawEnd = Math.floor(horizon + lineHeight/2);
  const wx = side===0 ? mapX : player.x + dist*rdx;
  const wy = side===1 ? mapY : player.y + dist*rdy;
  const baseLight = (hit ? lightContribution(wx+0.5, wy+0.5) : 0) * (side===1?0.92:1.0);
  const fl = flashlightContribution(rdx,rdy,dist);
  const totalLight = baseLight + fl;

  if (!hit){
    return {drawStart:BH, drawEnd:0};
  }

  const ds = Math.max(0,drawStart), de = Math.min(BH-1,drawEnd);
  const texColBase = texX;
  for (let y=ds; y<=de; y++){
    const texYf = (y-drawStart)/lineHeight;
    let texY = Math.floor(texYf*TEX_SIZE);
    if (texY<0) texY=0; if (texY>=TEX_SIZE) texY=TEX_SIZE-1;
    const tp = TEX_WALL[texY*TEX_SIZE+texColBase];
    const r=tp&0xFF, g=(tp>>8)&0xFF, b=(tp>>16)&0xFF;
    const col = shadeColor(r,g,b,totalLight,dist);
    pix32[y*BW+x] = packRGBA(col[0]|0,col[1]|0,col[2]|0,255);
  }
  return {drawStart, drawEnd};
}

function renderFloorCeilingRow(y, drawBounds){
  // standard floor/ceiling casting per row
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const planeX = -dirY*Math.tan(HALF_FOV), planeY = dirX*Math.tan(HALF_FOV);
  const isFloor = y > horizon;
  const p = isFloor ? (y-horizon) : (horizon-y);
  if (p<=0.0001) return;
  const rowDist = (BH*0.42) / p;
  if (rowDist>MAX_DIST*1.4) return;

  const stepX = rowDist*( (dirX+planeX) - (dirX-planeX) ) / BW;
  const stepY = rowDist*( (dirY+planeY) - (dirY-planeY) ) / BW;
  let floorX = player.x + rowDist*(dirX-planeX);
  let floorY = player.y + rowDist*(dirY-planeY);

  // approximate per-row brightness using center sample (cheap, smooth)
  const cx = player.x + rowDist*dirX, cy = player.y + rowDist*dirY;
  const baseLight = lightContribution(cx,cy);
  const fl = flashlightContribution(dirX,dirY,rowDist)*0.6;
  const totalLight = baseLight+fl;
  const tex = isFloor ? TEX_FLOOR : TEX_CEIL;

  const rowOffset = y*BW;
  for (let x=0;x<BW;x++){
    if (rowDist < zbuffer[x]){
      let tx = Math.floor(floorX*TEX_SIZE)&(TEX_SIZE-1);
      let ty = Math.floor(floorY*TEX_SIZE)&(TEX_SIZE-1);
      const tp = tex[ty*TEX_SIZE+tx];
      let r=tp&0xFF,g=(tp>>8)&0xFF,b=(tp>>16)&0xFF;
      let col;
      const cfx = Math.floor(floorX), cfy = Math.floor(floorY);
      let trailIdx;
      if (exitCell && cfx===exitCell.gx && cfy===exitCell.gy){
        // the exit tile glows green-white on both floor and ceiling, visible from afar
        const pulse = 0.7 + 0.3*Math.sin(performance.now()*0.004);
        col = [lerp(r,120,pulse), lerp(g,255,pulse), lerp(b,150,pulse)];
      } else if (isFloor && !huntActive && trailSet.size &&
                 (trailIdx=trailSet.get(cfx+','+cfy))!==undefined && trailIdx<=TRAIL_WINDOW){
        // breadcrumb glow on the floor — only the next few cells, fading out, and it
        // goes dark while you're being hunted (fear makes you lose the path)
        const fade = 1 - trailIdx/TRAIL_WINDOW;
        const flow = 0.5 + 0.5*Math.sin(performance.now()*0.006 - trailIdx*0.6);
        const a = fade*flow*0.45;
        const base = shadeColor(r,g,b,totalLight,rowDist);
        col = [lerp(base[0],170,a), lerp(base[1],45,a), lerp(base[2],40,a)];
      } else if (!isFloor && isLightCell(cfx, cfy)){
        // emissive fluorescent tube fixture - glows bright white, ignores fog/distance darkening
        const st = lightStateFor(cfx, cfy);
        const glow = st.off ? 0.1 : st.flicker;
        r = lerp(r,255,glow*0.78); g = lerp(g,244,glow*0.78); b = lerp(b,190,glow*0.7);
        col = [r,g,b];
      } else {
        col = shadeColor(r,g,b,totalLight,rowDist);
      }
      pix32[rowOffset+x] = packRGBA(col[0]|0,col[1]|0,col[2]|0,255);
    }
    floorX+=stepX; floorY+=stepY;
  }
}

/* ---- cast a ray from the player and return open distance to first wall ---- */
function castRayDist(angle, maxd){
  maxd = maxd||MAX_DIST;
  const rdx=Math.cos(angle), rdy=Math.sin(angle);
  let mapX=Math.floor(player.x), mapY=Math.floor(player.y);
  const ddX=Math.abs(1/rdx), ddY=Math.abs(1/rdy);
  let stepX,stepY,sdX,sdY;
  if (rdx<0){ stepX=-1; sdX=(player.x-mapX)*ddX; } else { stepX=1; sdX=(mapX+1-player.x)*ddX; }
  if (rdy<0){ stepY=-1; sdY=(player.y-mapY)*ddY; } else { stepY=1; sdY=(mapY+1-player.y)*ddY; }
  let side=0;
  for (let i=0;i<64;i++){
    if (sdX<sdY){ sdX+=ddX; mapX+=stepX; side=0; } else { sdY+=ddY; mapY+=stepY; side=1; }
    if (cellIsWall(mapX,mapY)){
      const d = side===0 ? (sdX-ddX) : (sdY-ddY);
      return Math.min(maxd, d);
    }
  }
  return maxd;
}
// place a sprite at a visible spot along a bearing: just short of the nearest wall
function visiblePoint(angle, desired, minVis){
  const open = castRayDist(angle, MAX_DIST);
  const d = Math.min(desired, open*0.8);
  if (d < (minVis||2.5)) return null; // corridor too short to show anything
  return { x: player.x+Math.cos(angle)*d, y: player.y+Math.sin(angle)*d, d };
}

/* ---- sprite projection (silhouettes / shadow entities / jumpscare) ---- */
function projectSprite(wx, wy, heightFrac, widthFrac, vOffset, drawCol){
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const planeX=-dirY*Math.tan(HALF_FOV), planeY=dirX*Math.tan(HALF_FOV);
  const relX = wx-player.x, relY = wy-player.y;
  const invDet = 1.0/(planeX*dirY - dirX*planeY);
  const tx = invDet*(dirY*relX - dirX*relY);
  const ty = invDet*(-planeY*relX + planeX*relY);
  if (ty<=0.15) return;
  const screenX = Math.floor((BW/2)*(1+tx/ty));
  const spriteH = Math.abs(Math.floor(BH/ty * heightFrac));
  const spriteW = Math.abs(Math.floor(BH/ty * widthFrac));
  const drawStartY = Math.floor(horizon - spriteH/2 + spriteH*vOffset);
  const drawEndY = drawStartY+spriteH;
  const xStart = Math.max(0, screenX-spriteW/2|0);
  const xEnd = Math.min(BW-1, screenX+spriteW/2|0);
  for (let x=xStart; x<=xEnd; x++){
    if (ty < zbuffer[x]){
      const u = (x-xStart)/Math.max(1,(xEnd-xStart));
      const ys = Math.max(0,drawStartY), ye=Math.min(BH-1,drawEndY);
      for (let y=ys;y<=ye;y++){
        const v = (y-drawStartY)/Math.max(1,spriteH);
        const col = drawCol(u,v,ty);
        if (col) pix32[y*BW+x] = packRGBA(col[0]|0,col[1]|0,col[2]|0,255);
      }
    }
  }
}

function exitColor(u,v,dist){
  // bright green glowing column, soft horizontal edges, brighter core
  const edge = Math.min(u, 1-u);
  if (edge < 0.04) return null;
  const pulse = 0.78 + 0.22*Math.sin(performance.now()*0.004 + v*3);
  const core = 1 - Math.abs(u-0.5)*1.4;
  const g = 200 + 55*pulse;
  const r = 70 + 90*core*pulse;
  const b = 110 + 80*core*pulse;
  return [r, g, b];
}
const EXIT_NEAR = 6.0; // pillar + skybeam only reveal within this many cells
function drawExit(){
  if (!exitCell) return;
  // only show the pillar once you're nearly on top of the exit, so it doesn't give
  // away the route across the whole maze
  if (Math.hypot(exitCell.x-player.x, exitCell.y-player.y) > EXIT_NEAR) return;
  // a tall glowing marker pillar at the exit tile, drawn like a sprite (occluded by walls)
  projectSprite(exitCell.x, exitCell.y, 2.2, 0.7, -0.1, exitColor);
}

// a soft green beam above the exit, drawn additively and IGNORING the z-buffer so
// it reads as light over the walls — a long-range "this way" cue that gets brighter
// only as you close in, so it orients without trivializing the maze.
function drawSkybeam(){
  if (!exitCell) return;
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const planeX=-dirY*Math.tan(HALF_FOV), planeY=dirX*Math.tan(HALF_FOV);
  const relX=exitCell.x-player.x, relY=exitCell.y-player.y;
  if (Math.hypot(relX, relY) > EXIT_NEAR) return; // only reveal when very close
  const invDet=1/(planeX*dirY-dirX*planeY);
  const tx=invDet*(dirY*relX-dirX*relY);
  const ty=invDet*(-planeY*relX+planeX*relY);
  if (ty<=0.2) return; // behind the player
  const sx=Math.floor((BW/2)*(1+tx/ty));
  if (sx<-20||sx>BW+20) return;
  const w=2+Math.floor(40/ty);
  const intensity=Math.max(0.1, Math.min(0.8, 5/ty));
  const x0=Math.max(0,sx-w), x1=Math.min(BW-1,sx+w);
  const yBot=Math.floor(horizon);
  for (let x=x0;x<=x1;x++){
    const hx=1-Math.abs(x-sx)/(w+1);
    if (hx<=0) continue;
    for (let y=0;y<yBot;y++){
      const vy=1-y/yBot;                  // brightest at the top
      const a=intensity*hx*(0.3+0.7*vy);
      if (a<=0.02) continue;
      const p=pix32[y*BW+x];
      let r=p&0xFF, g=(p>>8)&0xFF, b=(p>>16)&0xFF;
      r=Math.min(255,r+45*a); g=Math.min(255,g+185*a); b=Math.min(255,b+125*a);
      pix32[y*BW+x]=packRGBA(r|0,g|0,b|0,255);
    }
  }
}

function renderFrame(){
  for (let x=0;x<BW;x++) castColumn(x);
  for (let y=0;y<BH;y++) renderFloorCeilingRow(y, null);
  drawSkybeam();
  drawExit();
  drawActiveSprites();
  drawStalker();
  drawHunt();
  rctx.putImageData(imgData, 0, 0);
  sctx.clearRect(0,0,screenCanvas.width,screenCanvas.height);
  sctx.drawImage(renderCanvas, 0, 0, screenCanvas.width, screenCanvas.height);
}

/* ============================================================
   AUDIO (Web Audio API): hum, whine, footsteps (HRTF), buzz
   ============================================================ */
let actx=null, master=null, listenerReady=false;
function initAudio(){
  if (actx) { actx.resume(); return; }
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value=0.6; master.connect(actx.destination);

  // constant low hum: 58Hz + 116Hz + saw grit
  const hum1 = actx.createOscillator(); hum1.type='sine'; hum1.frequency.value=58;
  const hum2 = actx.createOscillator(); hum2.type='sine'; hum2.frequency.value=116;
  const grit = actx.createOscillator(); grit.type='sawtooth'; grit.frequency.value=58;
  const gritFilt = actx.createBiquadFilter(); gritFilt.type='lowpass'; gritFilt.frequency.value=180;
  const humGain = actx.createGain(); humGain.gain.value=0.05;
  const gritGain = actx.createGain(); gritGain.gain.value=0.012;
  hum1.connect(humGain); hum2.connect(humGain);
  grit.connect(gritFilt); gritFilt.connect(gritGain);
  humGain.connect(master); gritGain.connect(master);
  hum1.start(); hum2.start(); grit.start();

  // fluorescent high whine
  const whine = actx.createOscillator(); whine.type='sine'; whine.frequency.value=9800;
  const whineGain = actx.createGain(); whineGain.gain.value=0.0025;
  whine.connect(whineGain); whineGain.connect(master);
  whine.start();
  window.__whineGain = whineGain;

  window.__buzzChain = makeBuzzChain();
  listenerReady = true;
}
function makeBuzzChain(){
  const buzzOsc = actx.createOscillator(); buzzOsc.type='square'; buzzOsc.frequency.value=120;
  const buzzGain = actx.createGain(); buzzGain.gain.value=0;
  buzzOsc.connect(buzzGain); buzzGain.connect(master);
  buzzOsc.start();
  return {osc:buzzOsc, gain:buzzGain};
}
function setBuzz(intensity){
  if (!actx) return;
  window.__buzzChain.gain.gain.setTargetAtTime(intensity*0.04, actx.currentTime, 0.05);
}
function audioFlashlightClick(){
  if (!actx) return;
  const o = actx.createOscillator(); o.type='square'; o.frequency.value=400;
  const g = actx.createGain(); g.gain.value=0.05;
  o.connect(g); g.connect(master);
  o.start(); g.gain.setTargetAtTime(0, actx.currentTime+0.01, 0.01);
  o.stop(actx.currentTime+0.05);
}
function makeNoiseBuffer(duration){
  const len = Math.floor(actx.sampleRate*duration);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
  return buf;
}
function playSpatial(buffer, opts){
  if (!actx) return null;
  opts = opts||{};
  const src = actx.createBufferSource(); src.buffer = buffer;
  const filt = actx.createBiquadFilter();
  filt.type = opts.filterType||'bandpass';
  filt.frequency.value = opts.freq||700;
  filt.Q.value = opts.q||0.7;
  const gain = actx.createGain(); gain.gain.value = opts.gain!==undefined?opts.gain:0.3;
  let panner=null;
  if (opts.relX!==undefined){
    panner = actx.createPanner();
    panner.panningModel='HRTF'; panner.distanceModel='inverse';
    panner.refDistance=1; panner.maxDistance=40; panner.rolloffFactor=1.2;
    panner.positionX.value = opts.relX; panner.positionY.value=0; panner.positionZ.value=opts.relZ||0;
    src.connect(filt); filt.connect(gain); gain.connect(panner); panner.connect(master);
  } else {
    src.connect(filt); filt.connect(gain); gain.connect(master);
  }
  src.start();
  if (opts.duration) src.stop(actx.currentTime+opts.duration);
  return {src,gain,panner};
}
function playFootstep(relX, relZ, volume){
  if (!actx) return;
  const buf = makeNoiseBuffer(0.12);
  playSpatial(buf, {filterType:'lowpass', freq:900, gain:(volume||0.25), relX, relZ, duration:0.12});
}
function playFootstepSeries(count, interval, relXFn, relZFn, volume){
  let i=0;
  const id = setInterval(()=>{
    if (i>=count){ clearInterval(id); return; }
    playFootstep(relXFn(i), relZFn(i), volume);
    i++;
  }, interval);
  return id;
}
function updateListenerOrientation(){
  if (!actx || !actx.listener) return;
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const L = actx.listener;
  if (L.positionX){
    L.positionX.value=player.x; L.positionY.value=0; L.positionZ.value=player.y;
    L.forwardX.value=dirX; L.forwardY.value=0; L.forwardZ.value=dirY;
    L.upX.value=0; L.upY.value=1; L.upZ.value=0;
  } else if (L.setPosition){
    L.setPosition(player.x,0,player.y);
    L.setOrientation(dirX,0,dirY,0,1,0);
  }
}
function playGroan(){
  if (!actx) return;
  const o = actx.createOscillator(); o.type='sine'; o.frequency.value=85;
  const g = actx.createGain(); g.gain.value=0.0001;
  o.connect(g); g.connect(master);
  o.start();
  g.gain.linearRampToValueAtTime(0.05, actx.currentTime+0.4);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+2.2);
  o.frequency.linearRampToValueAtTime(60, actx.currentTime+2.2);
  o.stop(actx.currentTime+2.3);
}
function playScream(){
  if (!actx) return;
  const o = actx.createOscillator(); o.type='sawtooth'; o.frequency.value=320;
  const filt = actx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=900; filt.Q.value=4;
  const g = actx.createGain(); g.gain.value=0.0001;
  o.connect(filt); filt.connect(g); g.connect(master);
  o.start();
  g.gain.linearRampToValueAtTime(0.18, actx.currentTime+0.15);
  o.frequency.linearRampToValueAtTime(900, actx.currentTime+0.5);
  o.frequency.linearRampToValueAtTime(200, actx.currentTime+1.4);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+1.8);
  o.stop(actx.currentTime+1.9);
}
function playJumpscareStinger(){
  if (!actx) return;
  const buf = makeNoiseBuffer(0.5);
  playSpatial(buf, {filterType:'highpass', freq:200, gain:0.7, duration:0.5});
  const o = actx.createOscillator(); o.type='sawtooth'; o.frequency.value=110;
  const g = actx.createGain(); g.gain.value=0.4;
  o.connect(g); g.connect(master); o.start();
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.6);
  o.stop(actx.currentTime+0.6);
}
function playBreath(){
  if (!actx) return;
  // a slow ragged in-breath: filtered noise swell, close behind
  const buf = makeNoiseBuffer(1.1);
  playSpatial(buf, {filterType:'bandpass', freq:480, q:1.4, gain:0.13, relX:(Math.random()-0.5)*0.6, relZ:1.2, duration:1.1});
}
function playWhisper(){
  if (!actx) return;
  const buf = makeNoiseBuffer(0.55);
  playSpatial(buf, {filterType:'bandpass', freq:1900, q:2.4, gain:0.09, relX:(Math.random()-0.5)*2, relZ:0.6, duration:0.55});
}

/* ============================================================
   SUBTITLES
   ============================================================ */
const subtitleEl = document.getElementById('subtitle');
let subtitleTimer=null;
function showSubtitle(text, duration){
  subtitleEl.textContent = text;
  subtitleEl.style.opacity = 1;
  if (subtitleTimer) clearTimeout(subtitleTimer);
  subtitleTimer = setTimeout(()=>{ subtitleEl.style.opacity=0; }, duration||3000);
}

/* ============================================================
   HORROR EVENT SYSTEM
   ============================================================ */
let activeSprites = []; // {x,y,until,heightFrac,widthFrac,vOffset,colorFn}
function addSprite(spr){ activeSprites.push(spr); }
function drawActiveSprites(){
  const now = performance.now();
  activeSprites = activeSprites.filter(s=>s.until>now);
  for (const s of activeSprites){
    projectSprite(s.x, s.y, s.heightFrac, s.widthFrac, s.vOffset, s.colorFn);
  }
}

let eventActive = false;
let eventCooldownUntil = 0;
let nextEventAt = performance.now() + 4000;
let firstSilhouetteDone = false;
let screamUsed = false;
const startTime = performance.now();

function aheadStreetPoint(distAway){
  // find a point roughly ahead of the player along current facing, snapped to nearest street line for visibility
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  let x = player.x + dirX*distAway, y = player.y + dirY*distAway;
  return {x,y};
}

function eventFootstepsBehind(sync){
  showSubtitle(sync ? "...footsteps. matching yours." : "...footsteps behind you.", 3500);
  let cancelled=false;
  totalTurnSinceEvent = 0;
  const checkTurn = setInterval(()=>{
    if (totalTurnSinceEvent > 0.6){ cancelled=true; clearInterval(checkTurn); }
  }, 100);
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  const behindX = -dirX, behindY=-dirY;
  let i=0;
  const steps = 5+Math.floor(Math.random()*3);
  const id = setInterval(()=>{
    if (cancelled || i>=steps){ clearInterval(id); clearInterval(checkTurn); return; }
    const phase = sync ? (i*0.55) : (i*0.55 + 0.18);
    playFootstep(Math.sin(i*1.3)*0.6, 6, 0.35);
    i++;
  }, 550);
}

function eventLightFlicker(){
  if (nearbyLights.length===0) { endEvent(); return; }
  const L = nearbyLights[Math.floor(Math.random()*nearbyLights.length)];
  const st = lightStateFor(L.gx,L.gy);
  let ticks=0;
  setBuzz(1);
  const id = setInterval(()=>{
    st.flicker = Math.random()<0.5 ? (0.15+Math.random()*0.2) : 1;
    ticks++;
    if (ticks>10){ st.flicker=1; clearInterval(id); setBuzz(0); endEvent(); }
  }, 110);
}

function eventSingleLightOff(){
  // pick a light roughly behind the player
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  let candidate=null;
  for (const L of nearbyLights){
    const dx=L.x-player.x, dy=L.y-player.y;
    const dot = dx*dirX+dy*dirY;
    if (dot < -0.3){ candidate=L; break; }
  }
  if (!candidate){ endEvent(); return; }
  const st = lightStateFor(candidate.gx,candidate.gy);
  st.off = true;
  const checker = setInterval(()=>{
    const dx=candidate.x-player.x, dy=candidate.y-player.y;
    const d = Math.hypot(dx,dy);
    const ndx=dx/d, ndy=dy/d;
    const facing = ndx*Math.cos(player.angle)+ndy*Math.sin(player.angle);
    if (facing > 0.5){ st.off=false; clearInterval(checker); endEvent(); }
  }, 200);
  setTimeout(()=>{ st.off=false; clearInterval(checker); endEvent(); }, 12000);
}

// solid humanoid mask over the billboard: head + shoulders + tapering torso.
// returns true when (u,v) falls inside the body outline.
function inHumanoid(u,v){
  if (v < 0.0 || v > 1.0) return false;
  const cx = u - 0.5;             // -0.5..0.5 across width
  if (v < 0.18){                  // head
    const hr = 0.12;
    const hy = (v-0.09)/0.18;
    return (cx*cx)/(hr*hr) + (hy*hy) < 1.0;
  }
  if (v < 0.30){ return Math.abs(cx) < 0.30; }   // shoulders
  // torso + legs, tapering slightly downward
  const w = 0.30 - (v-0.30)*0.12;
  return Math.abs(cx) < w;
}
function makeSilhouetteColor(rgb){
  return function(u,v,dist){
    if (!inHumanoid(u,v)) return null;
    return rgb;
  };
}
const silhouetteColor = makeSilhouetteColor([10,10,14]);
function eventSilhouette(glimpseOnly){
  // closer than before so the figure is unmistakable and unsettling
  const p = visiblePoint(player.angle, 6+Math.random()*4, 2.5);
  if (!p){ endEvent(); return; }
  const dur = glimpseOnly ? 450 : (1100+Math.random()*900);
  showSubtitle(glimpseOnly ? "...did something just move?" : "something stands there. watching.", glimpseOnly?1500:3000);
  addSprite({x:p.x,y:p.y, until:performance.now()+dur, heightFrac:1.7, widthFrac:0.6, vOffset:0.06, colorFn:silhouetteColor});
  firstSilhouetteDone = true;
  setTimeout(endEvent, dur+50);
}

function eventShadowEntityFar(){
  const p = visiblePoint(player.angle, 13+Math.random()*4, 5.0);
  if (!p){ endEvent(); return; }
  const dur = 700+Math.random()*500;
  showSubtitle("a shape, far down the hall.", 2500);
  addSprite({x:p.x,y:p.y, until:performance.now()+dur, heightFrac:1.5, widthFrac:0.5, vOffset:0.06,
    colorFn:makeSilhouetteColor([4,4,6])});
  setTimeout(endEvent, dur+50);
}

function eventDistantNoise(){
  playGroan();
  showSubtitle("a distant sound. somewhere else.", 2500);
  setTimeout(endEvent, 1500);
}

function eventSpatialAnomaly(){
  const dirX=Math.cos(player.angle), dirY=Math.sin(player.angle);
  // pick a cell behind player not currently visible
  const bx = Math.floor(player.x - dirX*3 + (Math.random()-0.5)*4);
  const by = Math.floor(player.y - dirY*3 + (Math.random()-0.5)*4);
  if (cellIsWall(bx,by)){
    overrides.set(bx+','+by, {wall:false, expires:performance.now()+15000});
    showSubtitle("...was that door always there?", 3000);
  } else {
    overrides.set(bx+','+by, {wall:true, expires:performance.now()+15000});
    showSubtitle("...the hallway feels shorter now.", 3000);
  }
  setTimeout(()=>{ overrides.delete(bx+','+by); endEvent(); }, 8000);
}

function eventScream(){
  screamUsed = true;
  playScream();
  showSubtitle("AAAAAA— ...silence.", 4000);
  setTimeout(endEvent, 2500);
}

const jumpscareColor = (u,v)=>{ if (!inHumanoid(u,v)) return null; return [180,18,18]; };
function eventJumpscare(){
  const p = aheadStreetPoint(1.4);
  addSprite({x:p.x,y:p.y, until:performance.now()+260, heightFrac:2.6, widthFrac:1.2, vOffset:0.0,
    colorFn:jumpscareColor});
  playJumpscareStinger();
  const flashEl = document.getElementById('flash');
  flashEl.style.opacity = 0.9;
  setTimeout(()=>{ flashEl.style.opacity=0; }, 90);
  showSubtitle("", 100);
  setTimeout(endEvent, 400);
}

function eventBlackout(){
  // the lights cut out — a brief, deliberate plunge into near-dark with breathing,
  // then they snap back. Steady state stays lit; this is a short scripted beat.
  const affected=[];
  for (const L of nearbyLights){ const st=lightStateFor(L.gx,L.gy); st.off=true; affected.push(st); }
  ambientScale = 0.3;
  playBreath();
  setBuzz(0.5);
  showSubtitle("", 100);
  const dur = 700 + Math.random()*700;
  setTimeout(()=>{
    for (const st of affected){ st.off=false; st.flicker=1; }
    ambientScale = 1;
    setBuzz(0);
    if (Math.random()<0.5) playWhisper();
    endEvent();
  }, dur);
}

function endEvent(){
  eventActive = false;
  eventCooldownUntil = performance.now() + 1800 + Math.random()*2600;
}

/* ============================================================
   HUNT / CHASE  — rare but intense; shake it by changing direction
   ============================================================ */
const huntWarnEl = document.getElementById('huntwarn');
const huntTextEl = document.getElementById('hunttext');
let huntActive = false;
let huntEntity = null;       // {x,y} world position, homes toward player
let huntTimeLeft = 0;        // seconds before it catches you
let huntTurnAccum = 0;       // radians of turning banked during this hunt
let huntTurnNeeded = 0;      // radians required to shake it
let huntCooldownUntil = 0;   // no new hunt before this time
const huntEntityColor = makeSilhouetteColor([6,2,3]);

function huntThreshold(){
  // short fuse: walking in a straight line is genuinely risky and forces you to keep
  // changing direction. escalation() (~1 early, ~6.7 late) shortens it further.
  return Math.max(6, 12 - escalation()*2);
}
function startHunt(){
  huntActive = true;
  huntTimeLeft = 7.5;
  huntTurnAccum = 0;
  huntTurnNeeded = 2.4; // ~140 degrees of cumulative turning to lose it
  // spawn behind the player so turning around reveals it
  const a = player.angle + Math.PI;
  huntEntity = { x: player.x + Math.cos(a)*5.5, y: player.y + Math.sin(a)*5.5 };
  straightWalkTimer = 0;
  huntWarnEl.classList.add('on');
  huntTextEl.textContent = "SOMETHING'S COMING — CHANGE DIRECTION";
  huntTextEl.classList.add('on');
  playGroan();
  setBuzz(1);
}
function endHunt(shaken){
  if (!huntActive){ huntWarnEl.classList.remove('on'); huntTextEl.classList.remove('on'); return; }
  huntActive = false;
  huntEntity = null;
  huntWarnEl.classList.remove('on');
  huntTextEl.classList.remove('on');
  setBuzz(0);
  huntCooldownUntil = performance.now() + 12000 + Math.random()*12000;
  straightWalkTimer = 0;
  if (shaken) showSubtitle("...you lost it. for now.", 3000);
}
function updateHunt(dt){
  if (!huntActive){
    if (runOver) return;
    if (performance.now() < huntCooldownUntil) return;
    if (eventActive) return;
    if (straightWalkTimer > huntThreshold()) startHunt();
    return;
  }
  // (turning is banked into huntTurnAccum inside updatePlayer)
  // entity homes toward the player; turning lets you open distance
  const dx = player.x-huntEntity.x, dy = player.y-huntEntity.y;
  const dd = Math.hypot(dx,dy)||1;
  const chase = 1.9*dt;
  huntEntity.x += (dx/dd)*chase;
  huntEntity.y += (dy/dd)*chase;
  huntTimeLeft -= dt;
  // closer + less time => more intense red vignette
  const intensity = Math.max(0.25, 1 - huntTimeLeft/7.5);
  huntWarnEl.style.opacity = (0.5 + 0.5*intensity).toFixed(2);
  // footstep pursuit audio
  if (frameClock % 14 === 0) playFootstep((Math.random()-0.5)*0.8, Math.min(8, dd), 0.4);
  if (huntTurnAccum >= huntTurnNeeded){ endHunt(true); return; }
  if (huntTimeLeft <= 0){
    // caught: lunge to point blank, scream, lose
    huntEntity.x = player.x + Math.cos(player.angle)*1.0;
    huntEntity.y = player.y + Math.sin(player.angle)*1.0;
    eventJumpscare();
    playScream();
    finishRun(false);
  }
}
function drawHunt(){
  if (!huntActive || !huntEntity) return;
  projectSprite(huntEntity.x, huntEntity.y, 1.9, 0.7, 0.05, huntEntityColor);
}

/* ============================================================
   STALKER — the thing that's never quite there
   ============================================================ */
let stalker = null;              // {x,y} world position
let stalkerCooldownUntil = 0;
const stalkerColor = makeSilhouetteColor([8,8,12]);

function spawnStalker(){
  // try behind, then to the sides, at a visible medium distance
  for (const o of [Math.PI, Math.PI*0.6, -Math.PI*0.6, Math.PI*0.35, -Math.PI*0.35]){
    const a=player.angle+o+(Math.random()-0.5)*0.4;
    const p=visiblePoint(a, 7+Math.random()*4, 4.0);
    if (p){ stalker={x:p.x,y:p.y}; playWhisper(); return; }
  }
}
function updateStalker(dt){
  if (runOver || huntActive) return;
  const now=performance.now();
  if (now-runStartTime < 12000) return; // grace period to get your bearings
  if (!stalker){
    if (now<stalkerCooldownUntil) return;
    spawnStalker();
    stalkerCooldownUntil = now + 4000 + Math.random()*5000;
    return;
  }
  // homes in on the player whether or not it's being watched — it advances instead
  // of vanishing when you turn to face it
  const dx=player.x-stalker.x, dy=player.y-stalker.y;
  const d=Math.hypot(dx,dy)||1;
  stalker.x += (dx/d)*0.75*dt;
  stalker.y += (dy/d)*0.75*dt;
  if (frameClock%45===0) playBreath();
  // touching the stalker is instant death — it grabs you, screams, run over
  if (d<1.6){
    stalker=null;
    playScream();
    finishRun(false);
  }
}
function drawStalker(){
  if (!stalker) return;
  projectSprite(stalker.x, stalker.y, 1.8, 0.62, 0.05, stalkerColor);
}

function maybeTriggerSpecialFirstSilhouette(){
  if (!firstSilhouetteDone && (performance.now()-startTime) > 3000 && (performance.now()-startTime) < 10000){
    if (Math.random()<0.04){
      eventActive = true;
      eventSilhouette(false);
    }
  }
}

function escalation(){
  const t = (performance.now()-startTime)/1000;
  const walkFactor = Math.min(2.8, 1 + distanceWalked*0.016);
  const timeFactor = Math.min(2.4, 1 + t/200);
  return walkFactor*timeFactor;
}

function tickEvents(){
  const now = performance.now();
  if (huntActive) return; // hunt is the sole focus while active
  maybeTriggerSpecialFirstSilhouette();
  if (eventActive) return;
  if (now < eventCooldownUntil) return;
  if (now < nextEventAt) return;

  eventActive = true;
  const esc = escalation();
  const roll = Math.random();
  // weighted selection — heavier on the visible, dread-building beats
  if (roll < 0.16) eventFootstepsBehind(Math.random()<0.4);
  else if (roll < 0.30) eventLightFlicker();
  else if (roll < 0.42) eventSingleLightOff();
  else if (roll < 0.52) eventBlackout();
  else if (roll < 0.72) eventSilhouette(Math.random()<0.3);
  else if (roll < 0.82) eventShadowEntityFar();
  else if (roll < 0.92) eventDistantNoise();
  else if (roll < 0.97) eventSpatialAnomaly();
  else if (!screamUsed) eventScream();
  else eventBlackout();

  const baseInterval = 6000 - Math.min(4000, distanceWalked*30);
  nextEventAt = now + Math.max(1600, baseInterval/esc) + Math.random()*2000;

  // ultra-rare jumpscare roll, independent, <1% chance per minute, gated by min elapsed time
  if (now-startTime>30000 && Math.random() < (0.0001*esc)){
    setTimeout(eventJumpscare, 200);
  }
}

/* ============================================================
   POST FX: grain canvas
   ============================================================ */
const grainCanvas = document.getElementById('grain');
const gctx = grainCanvas.getContext('2d');
function resizeGrain(){ grainCanvas.width=160; grainCanvas.height=90; }
resizeGrain();
function drawGrain(){
  const w=grainCanvas.width,h=grainCanvas.height;
  const id = gctx.createImageData(w,h);
  const d = id.data;
  for (let i=0;i<d.length;i+=4){
    const v = (Math.random()*255)|0;
    d[i]=v; d[i+1]=v; d[i+2]=v; d[i+3]=40;
  }
  gctx.putImageData(id,0,0);
}

/* ============================================================
   HUD: rough heading to the exit beacon
   ============================================================ */
const hudEl = document.getElementById('hud');
function updateHud(){
  if (!exitCell || runOver){ hudEl.textContent=''; return; }
  const dx = exitCell.x-player.x, dy = exitCell.y-player.y;
  const dist = Math.hypot(dx,dy);
  let rel = Math.atan2(dy,dx) - player.angle;
  while (rel > Math.PI) rel -= 2*Math.PI;
  while (rel < -Math.PI) rel += 2*Math.PI;
  let arrow;
  if (Math.abs(rel) < 0.39) arrow='^ ahead';
  else if (Math.abs(rel) > Math.PI-0.39) arrow='v behind';
  else if (rel > 0) arrow='> right';
  else arrow='< left';
  hudEl.textContent = 'exit  '+Math.round(dist)+'m  '+arrow;
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
let lastT = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-lastT)/1000);
  lastT = now;
  frameClock++;

  // pause menu freezes the whole sim — no movement, events, stalker or hunt tick.
  // lastT is kept current above so dt doesn't jump when you resume.
  if (paused){ requestAnimationFrame(loop); return; }

  updatePlayer(dt);
  if (frameClock % 20 === 0) refreshNearbyLights(player.x, player.y);
  // ambient flicker - subtle, occasional, never to black
  for (const [k,st] of lightStates){
    if (!eventActive) st.flicker = lerp(st.flicker, 1, 0.05);
  }
  updateListenerOrientation();
  if (window.__whineGain) window.__whineGain.gain.value = 0.0018+Math.random()*0.001;

  // win check: stepping onto the exit tile escapes the backrooms
  if (gameStarted && !runOver && exitCell &&
      Math.floor(player.x)===exitCell.gx && Math.floor(player.y)===exitCell.gy){
    finishRun(true);
  }
  if (gameStarted && !runOver){
    const ck = Math.round(player.x)+','+Math.round(player.y);
    if (ck!==trailKeyCell){ trailKeyCell=ck; computeTrail(); }
  }
  if (gameStarted) updateStalker(dt);
  if (gameStarted) updateHunt(dt);
  if (gameStarted && frameClock % 10 === 0) updateHud();
  tickEvents();
  renderFrame();
  if (frameClock % 4 === 0) drawGrain();

  requestAnimationFrame(loop);
}
refreshNearbyLights(player.x, player.y);
requestAnimationFrame(loop);

})();
</script>
